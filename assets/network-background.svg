<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="800" y1="0" x2="800" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF7FA"/>
      <stop offset="1" stop-color="#E7F3F8"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 730) rotate(12) scale(300 220)">
      <stop stop-color="#56C8F0" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#56C8F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1450 240) rotate(180) scale(260 220)">
      <stop stop-color="#29B2E2" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#29B2E2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <style>
    .network-line {
      animation: linePulse 5.4s ease-in-out infinite;
      transform-origin: center;
    }

    .network-line.slow {
      animation-duration: 7.8s;
    }

    .network-line path {
      stroke-dasharray: 18 10;
      animation: dataFlow 8s linear infinite;
    }

    .network-line.slow path {
      animation-duration: 10.5s;
    }

    .node {
      animation: nodePulse 3.6s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .node.alt {
      animation-duration: 4.8s;
      animation-delay: -1.8s;
    }

    .node.fast {
      animation-duration: 2.8s;
      animation-delay: -1.1s;
    }

    .wave-points {
      animation: waveFloat 8s ease-in-out infinite;
    }

    .ambient-dot {
      animation: ambientDrift 6.4s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .ambient-dot.alt {
      animation-duration: 8.2s;
      animation-delay: -2.4s;
    }

    .spark {
      animation: sparkBlink 2.4s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .spark.alt {
      animation-delay: -1.2s;
      animation-duration: 3.1s;
    }

    @keyframes nodePulse {
      0%, 100% {
        opacity: 0.82;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.12);
      }
    }

    @keyframes linePulse {
      0%, 100% {
        opacity: 0.24;
      }
      50% {
        opacity: 0.78;
      }
    }

    @keyframes dataFlow {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -160;
      }
    }

    @keyframes waveFloat {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.88;
      }
      50% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    @keyframes ambientDrift {
      0%, 100% {
        opacity: 0.12;
        transform: translateY(0) scale(1);
      }
      50% {
        opacity: 0.26;
        transform: translateY(-14px) scale(1.14);
      }
    }

    @keyframes sparkBlink {
      0%, 100% {
        opacity: 0.18;
        transform: scale(1);
      }
      50% {
        opacity: 0.72;
        transform: scale(1.5);
      }
    }
  </style>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowRight)"/>

